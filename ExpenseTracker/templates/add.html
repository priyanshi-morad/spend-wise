{% extends "base.html" %}

{% block title %}{{ 'Edit' if edit else 'Add' }} Expense{% endblock %}

{% block content %}
<header class="header">
    <h1 class="page-title">{{ 'Edit' if edit else 'Add' }} Expense</h1>
    <p class="page-sub">Keep your records updated with just a few clicks.</p>
</header>

<div class="auth-container" style="min-height: auto; padding: 0;">
    <div class="auth-card" style="text-align: left; max-width: 600px;">
        <form method="POST">
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" required max="{{ today }}"
                       value="{{ expense.date if expense else today }}">
            </div>

            <div class="form-group">
                <label for="amount">Amount (₹)</label>
                <input type="number" step="0.01" id="amount" name="amount" required 
                       placeholder="0.00" value="{{ expense.amount if expense else '' }}">
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" required>
                    {% for cat in categories %}
                    <option value="{{ cat }}" 
                            {% if expense and expense.category == cat %}selected{% endif %}>
                        {{ cat }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="3" 
                          placeholder="What was this for?">{{ expense.description if expense else '' }}</textarea>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 32px;">
                <button type="submit" class="btn btn-primary">
                    {{ 'Update' if edit else 'Add' }} Expense
                </button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
