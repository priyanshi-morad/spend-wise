{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo"><span>💸</span> SpendWise</div>
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-sub">Sign in to manage your finances.</p>

        <form method="POST">
            <div class="form-group" style="text-align: left;">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="admin">
            </div>
            <div class="form-group" style="text-align: left;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px; margin-bottom: 24px;">
                Sign In
            </button>
        </form>

        <p style="font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? 
            <a href="{{ url_for('register') }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create Account</a>
        </p>
    </div>
</div>
{% endblock %}
